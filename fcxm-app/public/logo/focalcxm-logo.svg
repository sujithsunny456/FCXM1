<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <!-- Enso brushstroke circle -->
  <g transform="translate(10, 10)">
    <!-- Main circle stroke - thick brushstroke style -->
    <path
      d="M 50 8
         C 72 6, 90 14, 96 30
         C 104 50, 100 72, 88 86
         C 74 102, 52 108, 32 102
         C 14 96, 4 80, 4 62
         C 4 44, 14 28, 28 18
         C 36 12, 44 8, 50 8
         Z"
      stroke="#002856"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.85"
    />
    <!-- Gap at top-left to create open Enso effect -->
    <path
      d="M 18 20 C 22 14, 34 8, 50 8"
      stroke="#ffffff"
      stroke-width="11"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Brushstroke tail at bottom -->
    <path
      d="M 32 102 C 22 98, 10 88, 6 76"
      stroke="#002856"
      stroke-width="6"
      stroke-linecap="round"
      fill="none"
      opacity="0.5"
    />
    <!-- Inner texture strokes for brush feel -->
    <path
      d="M 96 30 C 100 42, 102 56, 98 68"
      stroke="#1E4278"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
      opacity="0.3"
    />
  </g>

  <!-- FocalCXM wordmark -->
  <text
    x="128"
    y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="#002856"
    letter-spacing="-0.5"
  >FocalCXM</text>

  <!-- Horizontal rule -->
  <line x1="128" y1="72" x2="410" y2="72" stroke="#1E4278" stroke-width="1" opacity="0.5"/>

  <!-- REMARKABLE EXPERIENCES tagline -->
  <text
    x="128"
    y="90"
    font-family="'Open Sans', Arial, sans-serif"
    font-size="11.5"
    font-weight="400"
    fill="#555555"
    letter-spacing="3"
  >REMARKABLE EXPERIENCES</text>
</svg>
